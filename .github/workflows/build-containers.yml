name: Build and Publish Docker images

on:
  push:
    branches: [ main ]
    paths:
      # '*/Dockerfile' to match only direct subfolders.
      - '*/Dockerfile'
  pull_request:
    branches: [ main ]
    paths:
      - '*/Dockerfile'

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      folder: ${{ steps.changed-folder.outputs.folder }}
      base-version: ${{ steps.version.outputs.base-version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get changed Dockerfile folder
        id: changed-folder
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD)
          else
            FILES=$(git diff --name-only HEAD^ HEAD)
          fi

          DOCKERFILE_COUNT=0
          for file in $FILES; do
            if [[ "$file" == *"Dockerfile" ]]; then
              DOCKERFILE_COUNT=$((DOCKERFILE_COUNT + 1))
            fi
          done

          # Check for multiple changed Dockerfiles per PR
          if [[ "$DOCKERFILE_COUNT" -gt 1 ]]; then
            echo "ERROR: Only one Dockerfile can be changed per PR. Found $DOCKERFILE_COUNT Dockerfiles."
            exit 1
          fi

          if [[ "$DOCKERFILE_COUNT" -eq 0 ]]; then
            echo "folder="
            exit 0
          fi

          for file in $FILES; do
            if [[ "$file" == *"Dockerfile" ]]; then
              folder=$(dirname "$file")
              if [ "$folder" != "." ]; then
                echo "folder=$(basename "$folder")" >> $GITHUB_OUTPUT
                break
              else
                echo "ERROR: Dockerfiles at the repository root are not supported. Place your Dockerfile in a named subfolder."
                exit 1
              fi
            fi
          done

      - name: Extract version from Dockerfile
        id: version
        if: steps.changed-folder.outputs.folder != ''
        run: |
          BASE_VERSION=$(grep 'LABEL version=' ./${{ steps.changed-folder.outputs.folder }}/Dockerfile \
            | sed 's/.*LABEL version="\([^"]*\)".*/\1/')
          if [ -z "$BASE_VERSION" ]; then
            echo "ERROR: Could not extract version from LABEL version=\"...\" in Dockerfile. Ensure the label exists and uses double quotes."
            exit 1
          fi
          echo "base-version=${BASE_VERSION}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.folder != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ needs.detect.outputs.folder }}/Dockerfile

      - name: Gitleaks detect leaked secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version does not already exist in GHCR
        run: |
          FOLDER="${{ needs.detect.outputs.folder }}"
          BASE_VERSION="${{ needs.detect.outputs.base-version }}"
          if docker manifest inspect "ghcr.io/cardio-care/${FOLDER}:${BASE_VERSION}" > /dev/null 2>&1; then
            echo "ERROR: Version ${BASE_VERSION} already exists. Bump LABEL version= in the Dockerfile."
            exit 1
          fi

      - name: Build Docker image
        run: |
          FOLDER="${{ needs.detect.outputs.folder }}"
          BASE_VERSION="${{ needs.detect.outputs.base-version }}"
          docker build \
            -t "ghcr.io/cardio-care/${FOLDER}:${BASE_VERSION}" \
            -t "ghcr.io/cardio-care/${FOLDER}:latest" \
            "./${FOLDER}"

      - name: Scan image with Trivy
        id: trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/cardio-care/${{ needs.detect.outputs.folder }}:${{ needs.detect.outputs.base-version }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/cardio-care/${{ needs.detect.outputs.folder }}:${{ needs.detect.outputs.base-version }}
          artifact-name: sbom-${{ needs.detect.outputs.folder }}.spdx.json
          output-file: sbom-${{ needs.detect.outputs.folder }}.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ needs.detect.outputs.folder }}
          path: sbom-${{ needs.detect.outputs.folder }}.spdx.json
          retention-days: 90

  push:
    runs-on: ubuntu-latest
    needs: [ detect, build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.detect.outputs.folder != ''
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download SBOM artifact
        uses: actions/download-artifact@v8
        with:
          name: sbom-${{ needs.detect.outputs.folder }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version does not already exist in GHCR
        run: |
          FOLDER="${{ needs.detect.outputs.folder }}"
          BASE_VERSION="${{ needs.detect.outputs.base-version }}"
          if docker manifest inspect "ghcr.io/cardio-care/${FOLDER}:${BASE_VERSION}" > /dev/null 2>&1; then
            echo "ERROR: Version ${BASE_VERSION} already exists in GHCR. Two PRs may have passed the version check concurrently. Bump LABEL version= and re-merge."
            exit 1
          fi

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ needs.detect.outputs.folder }}
          push: true
          tags: |
            ghcr.io/cardio-care/${{ needs.detect.outputs.folder }}:${{ needs.detect.outputs.base-version }}
            ghcr.io/cardio-care/${{ needs.detect.outputs.folder }}:latest

      - name: Sign image with Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Sign and attach SBOM
        run: |
          cosign sign --yes \
            ghcr.io/cardio-care/${{ needs.detect.outputs.folder }}@${{ steps.build.outputs.digest }}
          
          cosign attest --yes \
            --predicate sbom-${{ needs.detect.outputs.folder }}.spdx.json \
            --type spdx \
            ghcr.io/cardio-care/${{ needs.detect.outputs.folder }}@${{ steps.build.outputs.digest }}
